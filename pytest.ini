[pytest]
# Automatically adds the repository root directory to sys.path.
# This prevents 'ModuleNotFoundError: No module named "src"' across all testing environments.
pythonpath = .

# Default CLI execution options:
# -v: Enables verbose mode to display specific test names during execution.
# --strict-markers: Enforces formal registration of all custom test markers.
addopts = -v --strict-markers

# Documentation and registration of custom test suite markers (metadata tag filters)
markers =
    unit: Fast, isolated test functions targeting individual code modules (e.g., date parsers, validators).
    integration: Broader suite executions verifying pipeline connections and full database schema orchestration.