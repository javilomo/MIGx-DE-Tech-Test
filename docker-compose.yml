version: '3.8'

services:
  # 1. Database Service (PostgreSQL Data Warehouse)
  postgres_dw:
    image: postgres:15-alpine
    container_name: clinical_trials_postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Pipeline Service (Your Python App)
  data_pipeline:
    build: .
    container_name: clinical_trials_pipeline
    environment:
      - DB_HOST=postgres_dw
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./data:/app/data
    depends_on:
      postgres_dw:
        condition: service_healthy

volumes:
  postgres_data: